{% extends 'base.html' %}

{% block content %}

<h1>🏆 Leaderboard</h1>
<p class="subtitle">Top warriors ranked by level and XP</p>

<table style="width:100%; border-collapse: collapse;">
    <tr style="background:#0f172a;">
        <th>Rank</th>
        <th>Player</th>
        <th>Level</th>
        <th>XP</th>
        <th>Streak</th>
    </tr>

    {% for player in players %}
    <tr style="text-align:center; border-bottom:1px solid #1e293b;">
        <td>{{ forloop.counter }}</td>
        <td>{{ player.user.username }}</td>
        <td>{{ player.level }}</td>
        <td>{{ player.xp }}</td>
        <td>{{ player.streak }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
