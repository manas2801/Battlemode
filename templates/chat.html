{% extends 'base.html' %}
{% block content %}

<h1>🤖 Battle Assistant</h1>

<div id="chat-box" style="height:300px; overflow-y:auto; border:1px solid #38bdf8; padding:10px; border-radius:10px; margin-bottom:10px;"></div>

<input type="text" id="msg" placeholder="Ask something..." style="width:80%; padding:10px;">
<button class="btn" onclick="sendMsg()">Send</button>

<script>
function sendMsg() {
    let msg = document.getElementById('msg').value;

    fetch(`/chat-api/?msg=${msg}`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById('chat-box');
        box.innerHTML += `<p><b>You:</b> ${msg}</p>`;
        box.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;
        document.getElementById('msg').value = "";
    });
}
</script>

{% endblock %}
